<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login - BreastCare AI</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='assets/css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='assets/css/general_navbar.css') }}"
    />
  </head>

  <body>
    {% include "includes/general_navbar.html" %}

    <!-- Login Section -->
    <section class="ftco-section" style="padding-top: 150px">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 text-center mb-5">
            <h2 class="heading-section">User Login</h2>
          </div>
        </div>
        <div class="row justify-content-center">
          <div class="col-md-7 col-lg-5">
            <div class="wrap">
              
              <div class="login-wrap p-4 p-md-5">
                <h3 class="mb-4 text-center">Sign In</h3>
                <form
                  action="{{ url_for('user_login') }}"
                  method="POST"
                  class="signin-form"
                >
                  <div class="form-group mt-3">
                    <input
                      type="text"
                      name="identifier"
                      class="form-control"
                      required
                    />
                    <label class="form-control-placeholder" for="username"
                      >Username or Email</label
                    >
                  </div>
                  <div class="form-group mt-3">
                    <input
                      id="password-field"
                      type="password"
                      name="password"
                      class="form-control"
                      required
                    />
                    <label class="form-control-placeholder" for="password"
                      >Password</label
                    >
                    <span
                      toggle="#password-field"
                      class="fa fa-fw fa-eye field-icon toggle-password"
                    ></span>
                  </div>
                  <div class="form-group mt-3">
                    <button
                      type="submit"
                      class="form-control btn btn-primary rounded submit px-3"
                    >
                      Sign In
                    </button>
                  </div>
                  <div class="form-group d-flex justify-content-between mt-2">
                    <label class="checkbox-wrap checkbox-primary mb-0">
                      Remember Me
                      <input type="checkbox" checked />
                      <span class="checkmark"></span>
                    </label>
                    <a href="#">Forgot Password?</a>
                  </div>
                </form>
                <p class="text-center mt-3">
                  Not a member?
                  <a href="{{ url_for('register_user') }}">Sign Up</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Bootstrap & JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/popper.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
