<style>
.flash-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    max-width: 400px;
    width: calc(100% - 40px);
    pointer-events: none;
}

.alert {
    pointer-events: auto;
    padding: 16px 20px;
    margin-bottom: 10px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideIn 0.5s ease forwards;
    border-left: 5px solid;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}

.alert-success {
    background: rgba(76, 175, 80, 0.95);
    border-left-color: #2e7d32;
    color: white;
}

.alert-warning {
    background: rgba(255, 152, 0, 0.95);
    border-left-color: #c66900;
    color: white;
}

.alert .close {
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    padding: 0 5px;
    margin-left: 15px;
    opacity: 0.7;
    transition: all 0.3s ease;
    line-height: 1;
}

.alert .close:hover {
    opacity: 1;
    transform: scale(1.2);
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.alert-success::before {
    content: "✓";
    font-weight: bold;
    margin-right: 10px;
    font-size: 18px;
}

.alert-warning::before {
    content: "!";
    font-weight: bold;
    margin-right: 10px;
    font-size: 18px;
    background: white;
    color: #ff9800;
    width: 20px;
    height: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

@media (max-width: 768px) {
    .flash-container {
        top: 10px;
        right: 10px;
        width: calc(100% - 20px);
    }
    
    .alert {
        padding: 12px 15px;
        font-size: 14px;
    }
}
</style>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-container">
      {% for message in messages %}
        <div class="alert alert-{% if '✅' in message or '🎉' in message or 'success' in message|lower %}success{% else %}warning{% endif %} alert-dismissible">
          <button type="button" class="close" data-dismiss="alert">&times;</button>
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
<script>// Auto-hide flash messages after 3 seconds
setTimeout(function() {
    var flashes = document.querySelectorAll('.alert');
    flashes.forEach(function(flash) {
        flash.style.transition = 'opacity 0.5s ease';
        flash.style.opacity = '0';
        setTimeout(function() {
            flash.style.display = 'none';
        }, 500);
    });
}, 3000);</script>
