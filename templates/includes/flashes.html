
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f7f7f7;
}

header {
    background: #004aad;
    color: white;
    padding: 1em;
    text-align: center;
}

header a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

main {
    padding: 2em;
    max-width: 600px;
    margin: auto;
    background: white;
    margin-top: 2em;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

form label {
    display: block;
    margin: 10px 0 5px;
}

form input, form select {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #004aad;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #00338a;
}
.view_donations {
    width: 80%;
    margin: 30px auto;
}

.view_donations h1 {
    margin-bottom: 20px;
}

.donation_item {
    background: #ffffff;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.donation_item p {
    margin: 6px 0;
    font-size: 15px;
}

.donation_item hr {
    margin-top: 15px;
    border: none;
    border-top: 1px solid #e0e0e0;
}

.view_donations h3 {
    margin-top: 20px;
    font-weight: 600;
}

/* Flash Messages Container */
.container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    max-width: 400px;
    width: calc(100% - 40px);
    pointer-events: none;
}

/* Alert Base Styles */
.alert {
    pointer-events: auto;
    padding: 16px 20px;
    margin-bottom: 10px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideIn 0.5s ease forwards;
    border-left: 5px solid;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}

/* Success Message (✅) */
.alert-success {
    background: rgba(76, 175, 80, 0.95);
    border-left-color: #2e7d32;
    color: white;
}

/* Warning/Other Messages */
.alert-warning {
    background: rgba(255, 152, 0, 0.95);
    border-left-color: #c66900;
    color: white;
}

/* Close Button */
.alert .close {
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    padding: 0 5px;
    margin-left: 15px;
    opacity: 0.7;
    transition: all 0.3s ease;
    line-height: 1;
}

.alert .close:hover {
    opacity: 1;
    transform: scale(1.2);
}

/* Animations */
@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOut {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(100%);
        opacity: 0;
    }
}

/* Optional: Add icons before messages */
.alert-success::before {
    content: "✓";
    font-weight: bold;
    margin-right: 10px;
    font-size: 18px;
}

.alert-warning::before {
    content: "!";
    font-weight: bold;
    margin-right: 10px;
    font-size: 18px;
    background: white;
    color: #ff9800;
    width: 20px;
    height: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}


@media (max-width: 768px) {
    .container {
        top: 10px;
        right: 10px;
        width: calc(100% - 20px);
    }
    
    .alert {
        padding: 12px 15px;
        font-size: 14px;
    }
}

</style>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="container">
      {% for message in messages %}
        <div
          class="alert alert-{% if '✅' in message %}success{% else %}warning{% endif %} alert-dismissible"
        >
          <button type="button" class="close" data-dismiss="alert">&times;</button>
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
