
  <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div class="container mt-5 pt-5">
      {% for category, message in messages %}
      <div
        class="alert alert-{{ category }} alert-dismissible fade show"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %}
<!-- Navbar / Header -->
<header class="header d-flex align-items-center fixed-top">
  <div
    class="header-container container-fluid container-xl d-flex align-items-center justify-content-between"
  >
    <!-- Logo -->
    <a
      href="{{ url_for('index') }}"
      class="logo d-flex align-items-center text-decoration-none"
    >
      <i class="fas fa-ribbon text-danger fs-3 me-2"></i>
      <h1 class="sitename m-0 fw-bold">BreastCare AI</h1>
    </a>

    
    <div class="d-flex align-items-center gap-2">
      <!-- Register User Link with navmenu styles -->
      <a
        href="{{ url_for('register_user') }}"
        class="nav-link fw-semibold navmenu-link"
      >
        Register User
      </a>
      

       {% if home %}
    <div class="d-flex align-items-center gap-2">
      <!-- Register User Link with navmenu styles -->
      <a
        href="{{ url_for('index') }}"
        class="nav-link fw-semibold navmenu-link"
      >
        Home
      </a>
      {% endif %}
      <!-- Login Dropdown -->
      <div class="user-menu dropdown">
        <button
          class="btn btn-danger dropdown-toggle px-4 py-2"
          type="button"
          id="loginDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false"
        >
          <i class="fa fa-sign-in-alt me-2"></i>Login
        </button>
        <ul
          class="dropdown-menu dropdown-menu-end shadow"
          aria-labelledby="loginDropdown"
        >
          <li>
            <a class="dropdown-item" href="{{ url_for('user_login') }}">
              <i class="fa fa-user me-2"></i>User Login
            </a>
          </li>
          <li>
            <a class="dropdown-item" href="{{ url_for('admin_login') }}">
              <i class="fa fa-user-shield me-2"></i>Admin Login
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Select all Bootstrap alerts
    const alerts = document.querySelectorAll('.alert');

    alerts.forEach(alert => {
      // Wait 2 seconds (2000ms) then close
      setTimeout(() => {
        // Bootstrap 5 alert remove
        const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
        bsAlert.close();
      }, 2000);
    });
  });
</script>
