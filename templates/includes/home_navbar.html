<header class="header d-flex align-items-center fixed-top">
    {% include "includes/flashes.html" %}
    <div class="header-container container-fluid container-xl d-flex align-items-center justify-content-between">
        <!-- Logo -->
        <a href="{{ url_for('user_profile') }}" class="logo" style="display: flex; align-items: center; text-decoration: none">
            <i class="fas fa-hand-holding-heart me-2" style="color: #dc3545; font-size: 24px; margin-right: 8px"></i>
            <h1 class="sitename" style="margin: 0; font-weight: bold; color: white; font-size: 20px">
                Foundation System
            </h1>
        </a>

        <!-- Navigation -->
        <nav class="navmenu">
            {% if details %}
            <ul>
                <li><a href="{{url_for('user_profile')}}" class="">Home</a></li>
            
            {% endif %}
           
           
          
                <li><a href="" class=""></a></li>
            </ul>
           
        </nav>

        <!-- User Menu - FIXED STRUCTURE -->
        <div class="d-flex align-items-center gap-3">
            {% if show_pp %}
            <div class="user-info d-flex align-items-center gap-2">
                <a href="{{ url_for('user_settings') }}" class="d-flex align-items-center gap-2 text-decoration-none">
                    <div class="avatar">
                        {% if session.get('picture') %}
                        <img src="{{ url_for('static', filename=session.picture) }}" alt="Profile" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                        {% else %}
                        <div style="width: 35px; height: 35px; border-radius: 50%; background: #dc3545; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                            {{ session.username[0]|upper }}
                        </div>
                        {% endif %}
                    </div>
                    <span style="color: white;">Profile</span>
                </a>
            </div>
            {% endif %}

            <!-- Logout Button -->
            <a href="{{ url_for('user_logout') }}" class="btn-getstarted" style="background: #dc3545; color: white; padding: 8px 20px; border-radius: 50px; text-decoration: none;">Logout</a>
        </div>
    </div>
</header>
