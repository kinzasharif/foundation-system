<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - BreastCare AI</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='assets/css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='assets/css/general_navbar.css') }}"
    />

    <style>
      .wrap {
        margin-top: 20px; /* push below navbar */
      }

      .wrap .img {
        width: 100%;
        height: 250px;
        background-image: url('{{ url_for("static", filename="assets/img/bg-4.jpg") }}');
        background-position: center 40%;
        background-repeat: no-repeat;
        background-size: contain;
        border-radius: 0px;
        margin-bottom: 15px;
      }

      .register-img {
        width: 100%;
        display: none; /* hide fallback img */
      }

      .login-wrap {
        background: #fff;
        padding: 20px 25px;
        border-radius: 6px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .form-control-placeholder {
        position: absolute;
        top: 10px;
        left: 15px;
        transition: all 0.2s;
        pointer-events: none;
        font-size: 0.9rem;
        color: #999;
      }

      .form-control:focus + .form-control-placeholder,
      .form-control:not(:placeholder-shown) + .form-control-placeholder {
        top: -10px;
        left: 10px;
        font-size: 0.8rem;
        color: #555;
      }

      .field-icon {
        float: right;
        margin-right: 10px;
        margin-top: -30px;
        position: relative;
        z-index: 2;
        cursor: pointer;
        color: #999;
      }
    </style>
  </head>

  <body>
    {% include "includes/general_navbar.html" %}

    <section class="ftco-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 text-center mb-5">
            <h2 class="heading-section">Register User</h2>
          </div>
        </div>

        <div class="row justify-content-center">
          <div class="col-md-7 col-lg-5">
            <div class="wrap">
              <div class="img"></div>

              <div class="login-wrap">
                <h3 class="mb-4 text-center">Register</h3>

                <form
                  action="{{ url_for('register_user') }}"
                  method="POST"
                  enctype="multipart/form-data"
                >
                  <div class="form-group position-relative mt-3">
                    <input
                      type="text"
                      name="username"
                      class="form-control"
                      required
                      placeholder=" "
                    />
                    <label class="form-control-placeholder">Username</label>
                  </div>

                  <div class="form-group position-relative mt-3">
                    <input
                      type="email"
                      name="email"
                      class="form-control"
                      required
                      placeholder=" "
                    />
                    <label class="form-control-placeholder">Email</label>
                  </div>

                  <div class="form-group position-relative mt-3">
                    <input
                      id="password-field"
                      type="password"
                      name="password"
                      class="form-control"
                      required
                      placeholder=" "
                    />
                    <label class="form-control-placeholder">Password</label>
                    <span
                      toggle="#password-field"
                      class="fa fa-fw fa-eye field-icon toggle-password"
                    ></span>
                  </div>

                  <div class="form-group position-relative mt-3">
                    <input
                      type="tel"
                      name="phone"
                      class="form-control"
                      required
                      placeholder=" "
                    />
                    <label class="form-control-placeholder">Phone</label>
                  </div>

                  <div class="form-group position-relative mt-3">
                    <input
                      type="text"
                      name="cnic"
                      class="form-control"
                      required
                      placeholder=" "
                    />
                    <label class="form-control-placeholder">CNIC</label>
                  </div>

                  <div class="form-group position-relative mt-3">
                    <input
                      type="file"
                      name="picture"
                      class="form-control"
                      id="customFile"
                    />
                    <label class="form-control-placeholder" for="customFile"
                      >Profile Picture</label
                    >
                  </div>

                  <div class="form-group mt-3">
                    <button
                      type="submit"
                      class="form-control btn btn-primary rounded submit px-3"
                    >
                      Register
                    </button>
                  </div>
                </form>

                <p class="text-center mt-3">
                  Already have an account?
                  <a href="{{ url_for('user_login') }}">Sign In</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const toggleButtons = document.querySelectorAll(".toggle-password");
        toggleButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            const targetId = this.getAttribute("toggle");
            const passwordInput = document.querySelector(targetId);
            if (passwordInput) {
              if (passwordInput.type === "password") {
                passwordInput.type = "text";
                this.classList.remove("fa-eye");
                this.classList.add("fa-eye-slash");
              } else {
                passwordInput.type = "password";
                this.classList.remove("fa-eye-slash");
                this.classList.add("fa-eye");
              }
            }
          });
        });
      });
    </script>
  </body>
</html>
